name: Scrape Twitter Data

on:
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Run Scraper
        env:
          TWITTER_AUTHTOKEN: ${{ secrets.TWITTER_AUTHTOKEN }}
        run: python scrape_tweets.py

      - name: Upload results
        uses: actions/upload-artifact@v3
        with:
          name: scraped-data
          path: |
            tweets-data/
            BoP_Indonesia_Scraped_Data.xlsx
